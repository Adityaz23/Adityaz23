<svg width="800" height="460" viewBox="0 0 800 460" xmlns="http://www.w3.org/2000/svg" font-family="Consolas, Monaco, 'Courier New', monospace">
  <defs>
    <linearGradient id="barFill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#3fb950"/>
    </linearGradient>
    <clipPath id="round">
      <rect x="0" y="0" width="800" height="460" rx="12"/>
    </clipPath>
  </defs>

  <!-- hidden master timer that all line reveals sync against, so the whole thing loops -->
  <rect x="0" y="0" width="1" height="1" opacity="0">
    <animate id="cycle" attributeName="opacity" from="0" to="0" dur="13s" begin="0s;cycle.end"/>
  </rect>

  <g clip-path="url(#round)">
    <rect x="0" y="0" width="800" height="460" fill="#0d1117"/>
    <rect x="0" y="0" width="800" height="40" fill="#161b22"/>
    <line x1="0" y1="40" x2="800" y2="40" stroke="#30363d" stroke-width="1"/>

    <circle cx="26" cy="20" r="6" fill="#ff5f56"/>
    <circle cx="48" cy="20" r="6" fill="#ffbd2e"/>
    <circle cx="70" cy="20" r="6" fill="#27c93f"/>
    <text x="400" y="25" text-anchor="middle" font-size="13" font-weight="600" fill="#8b949e" letter-spacing="1">AI ENGINEER TERMINAL</text>

    <!-- $ whoami -->
    <text x="24" y="70" font-size="15" fill="#58a6ff" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="cycle.begin+0.3s" fill="freeze"/>
      $ whoami
    </text>
    <text x="24" y="94" font-size="15" fill="#c9d1d9" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="cycle.begin+0.9s" fill="freeze"/>
      Aditya Kumar Soni
    </text>

    <!-- $ stack -->
    <text x="24" y="142" font-size="15" fill="#58a6ff" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="cycle.begin+2.0s" fill="freeze"/>
      $ stack
    </text>
    <text x="24" y="166" font-size="14" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="cycle.begin+2.6s" fill="freeze"/>
      <tspan fill="#79c0ff">AI</tspan><tspan fill="#8b949e"> • </tspan>
      <tspan fill="#d2a8ff">LLM</tspan><tspan fill="#8b949e"> • </tspan>
      <tspan fill="#ffa657">RAG</tspan><tspan fill="#8b949e"> • </tspan>
      <tspan fill="#7ee787">Next.js</tspan><tspan fill="#8b949e"> • </tspan>
      <tspan fill="#79c0ff">Python</tspan><tspan fill="#8b949e"> • </tspan>
      <tspan fill="#d2a8ff">TypeScript</tspan>
    </text>

    <!-- $ current_status -->
    <text x="24" y="214" font-size="15" fill="#58a6ff" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="cycle.begin+3.8s" fill="freeze"/>
      $ current_status
    </text>
    <text x="24" y="238" font-size="14" fill="#c9d1d9" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="cycle.begin+4.4s" fill="freeze"/>
      Building intelligent systems...
    </text>
    <rect x="330" y="228" width="210" height="14" rx="7" fill="#21262d"/>
    <rect x="330" y="228" height="14" rx="7" fill="url(#barFill)" width="0">
      <animate attributeName="width" from="0" to="172" dur="1.4s" begin="cycle.begin+4.4s" fill="freeze"/>
    </rect>
    <text x="550" y="239" font-size="12" fill="#c9d1d9" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="cycle.begin+5.8s" fill="freeze"/>
      82%
    </text>

    <!-- $ models -->
    <text x="24" y="286" font-size="15" fill="#58a6ff" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="cycle.begin+6.4s" fill="freeze"/>
      $ models
    </text>
    <text x="24" y="310" font-size="14" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="cycle.begin+7.0s" fill="freeze"/>
      <tspan fill="#79c0ff">Llama</tspan><tspan fill="#8b949e"> • </tspan>
      <tspan fill="#d2a8ff">Qwen</tspan><tspan fill="#8b949e"> • </tspan>
      <tspan fill="#ffa657">Gemma</tspan><tspan fill="#8b949e"> • </tspan>
      <tspan fill="#7ee787">GPT</tspan><tspan fill="#8b949e"> • </tspan>
      <tspan fill="#79c0ff">DeepSeek</tspan>
    </text>

    <!-- $ mission -->
    <text x="24" y="358" font-size="15" fill="#58a6ff" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="cycle.begin+8.2s" fill="freeze"/>
      $ mission
    </text>
    <text x="24" y="382" font-size="14" fill="#3fb950" opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="cycle.begin+8.8s" fill="freeze"/>
      &gt; Ship products. Solve problems. Learn endlessly.
    </text>
  </g>
  <g>
      <!-- blinking cursor -->
    <rect x="386" y="369" width="9" height="16" fill="#3fb950">
      <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="0.9s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
